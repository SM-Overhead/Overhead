<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Overhead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@700;800&family=Inconsolata:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface: #0d1220;
      --surface2: #111827;
      --border: #1a2340;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --green: #10b981;
      --amber: #f59e0b;
      --purple: #8b5cf6;
      --text: #f0f4ff;
      --muted: #4b5f7c;
      --subtle: #1e2d47;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh; min-height: 100dvh;
      overflow-x: hidden;
    }

    body::before {
      content:''; position:fixed; top:-30%; left:-20%;
      width:70%; height:70%;
      background:radial-gradient(ellipse,rgba(59,130,246,0.07) 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }

    .app {
      position:relative; z-index:1;
      max-width:430px; margin:0 auto;
      padding:0 16px 40px;
    }

    /* ── HERO ────────────────────────────────────────────────────────────── */

    #heroScreen {
      display:flex; flex-direction:column; align-items:center;
      padding:48px 0 32px; min-height:100vh; min-height:100dvh;
      justify-content:center;
    }

    .hero-top { text-align:center; margin-bottom:40px; }

    .hero-logo {
      font-size:48px; margin-bottom:12px;
      animation:floatPlane 4s ease-in-out infinite;
      display:inline-block;
      filter:drop-shadow(0 0 16px rgba(59,130,246,0.6));
    }

    @keyframes floatPlane {
      0%,100% { transform:translateY(0) rotate(-5deg); }
      50%      { transform:translateY(-8px) rotate(5deg); }
    }

    .hero-title {
      font-family:'Syne',sans-serif;
      font-size:42px; font-weight:800; letter-spacing:-1px; line-height:1;
      background:linear-gradient(135deg,#f0f4ff 0%,#94b4ff 50%,#06b6d4 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      margin-bottom:8px;
    }

    .hero-sub { font-size:14px; color:var(--muted); letter-spacing:0.2px; }

    .radar-wrap { position:relative; width:220px; height:220px; margin-bottom:28px; }

    .radar {
      width:220px; height:220px; border-radius:50%;
      border:1px solid rgba(59,130,246,0.25);
      position:relative; overflow:hidden;
      background:radial-gradient(circle,rgba(59,130,246,0.04) 0%,transparent 70%);
    }

    .radar-ring {
      position:absolute; border-radius:50%;
      border:1px solid rgba(59,130,246,0.15);
      top:50%; left:50%; transform:translate(-50%,-50%);
    }

    .r1 { width:66%; height:66%; }
    .r2 { width:33%; height:33%; }
    .r3 { width:100%; height:100%; border-color:rgba(59,130,246,0.25); }

    .radar::before, .radar::after {
      content:''; position:absolute; background:rgba(59,130,246,0.1);
    }
    .radar::before { width:1px; height:100%; left:50%; top:0; }
    .radar::after  { width:100%; height:1px; top:50%; left:0; }

    .radar-sweep {
      position:absolute; width:50%; height:50%;
      top:0; left:50%; transform-origin:0% 100%;
      animation:sweep 3s linear infinite;
      background:conic-gradient(from 0deg, transparent 300deg, rgba(59,130,246,0.35) 360deg);
      border-radius:0 100% 0 0;
    }

    @keyframes sweep { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

    .radar-centre {
      position:absolute; width:8px; height:8px; border-radius:50%;
      background:var(--accent); top:50%; left:50%; transform:translate(-50%,-50%);
      box-shadow:0 0 10px var(--accent);
    }

    .radar-blip {
      position:absolute; font-size:12px; opacity:0;
      animation:blipFade 3s ease-in-out infinite;
      color:var(--accent2);
      filter:drop-shadow(0 0 4px var(--accent2));
    }

    .b1 { top:28%; left:62%; animation-delay:0.8s; }
    .b2 { top:55%; left:30%; animation-delay:1.9s; }
    .b3 { top:20%; left:38%; animation-delay:2.7s; }

    @keyframes blipFade {
      0%,100% { opacity:0; transform:scale(0.5); }
      40%,60%  { opacity:1; transform:scale(1); }
    }

    .hero-clock {
      font-family:'Inconsolata',monospace;
      font-size:28px; color:var(--text);
      letter-spacing:2px; margin-bottom:8px;
      text-shadow:0 0 20px rgba(59,130,246,0.3);
    }

    .hero-tagline {
      font-size:13px; color:var(--muted); text-align:center;
      line-height:1.7; margin-bottom:36px; padding:0 8px;
    }

    .hero-scan-btn {
      width:100%; max-width:340px;
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
      color:#fff; border:none; border-radius:16px;
      padding:18px; font-size:16px; font-weight:500;
      font-family:'Space Grotesk',sans-serif;
      cursor:pointer; transition:opacity 0.2s,transform 0.1s;
      display:flex; align-items:center; justify-content:center;
      gap:10px; margin-bottom:16px;
      box-shadow:0 8px 32px rgba(59,130,246,0.25);
    }

    .hero-scan-btn:active { transform:scale(0.98); opacity:0.9; }
    .hero-scan-btn:disabled { background:var(--surface2); color:var(--muted); cursor:default; box-shadow:none; }

    .hero-footer-note {
      font-size:11px; color:var(--subtle); text-align:center;
      font-family:'Inconsolata',monospace; letter-spacing:0.3px;
    }

    /* ── POST-SCAN ───────────────────────────────────────────────────────── */

    .header {
      padding:52px 0 8px;
      display:flex; align-items:flex-end; justify-content:space-between;
    }

    .logo { display:flex; align-items:center; gap:10px; }

    .logo-icon {
      width:36px; height:36px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius:10px; display:flex; align-items:center; justify-content:center;
      font-size:18px;
    }

    .logo h1 {
      font-family:'Syne',sans-serif;
      font-size:26px; font-weight:800; letter-spacing:-0.5px;
      background:linear-gradient(90deg,#f0f4ff,#94b4ff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    .live-pill {
      display:flex; align-items:center; gap:6px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:6px 12px;
      font-size:11px; font-family:'Inconsolata',monospace;
      color:var(--muted); transition:all 0.3s;
    }

    .live-pill.active { border-color:rgba(16,185,129,0.3); color:var(--green); }

    .live-dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--muted); transition:all 0.3s; flex-shrink:0;
    }

    .live-pill.active .live-dot {
      background:var(--green); box-shadow:0 0 6px var(--green);
      animation:pulse 2s infinite;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .location-info {
      margin:20px 0 8px;
      font-size:12px; font-family:'Inconsolata',monospace;
      color:var(--muted);
    }

    .scan-btn {
      width:100%;
      background:linear-gradient(135deg,var(--accent) 0%,var(--accent2) 100%);
      color:#fff; border:none; border-radius:16px;
      padding:18px; font-size:16px; font-weight:500;
      font-family:'Space Grotesk',sans-serif;
      cursor:pointer; transition:opacity 0.2s,transform 0.1s;
      display:flex; align-items:center; justify-content:center;
      gap:10px; margin-bottom:28px;
    }

    .scan-btn:active { transform:scale(0.98); opacity:0.9; }
    .scan-btn:disabled { background:var(--surface2); color:var(--muted); cursor:default; }

    .section-label {
      font-size:10px; font-family:'Inconsolata',monospace;
      letter-spacing:1.5px; color:var(--muted);
      text-transform:uppercase; margin-bottom:12px;
    }

    .flights-list { display:flex; flex-direction:column; gap:12px; }

    /* ── CARDS ───────────────────────────────────────────────────────────── */

    .flight-card {
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; overflow:hidden;
      animation:slideUp 0.35s cubic-bezier(0.16,1,0.3,1) both;
      cursor:pointer;
    }

    .flight-card.primary {
      border-color:rgba(59,130,246,0.35);
      background:linear-gradient(160deg,#0d1525 0%,#0a1220 100%);
    }

    .flight-card.private { border-color:rgba(139,92,246,0.3); }
    .flight-card.private.primary { background:linear-gradient(160deg,#110d25 0%,#0a0a20 100%); }
    .flight-card.cargo { border-color:rgba(245,158,11,0.3); }
    .flight-card.cargo.primary { background:linear-gradient(160deg,#151005 0%,#100d00 100%); }
    .flight-card.military { border-color:rgba(16,185,129,0.3); }

    @keyframes slideUp {
      from{opacity:0;transform:translateY(16px)}
      to{opacity:1;transform:translateY(0)}
    }

    .card-strip {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 16px 0;
    }

    .airline-badge { display:flex; align-items:center; gap:8px; min-width:0; }

    .airline-dot {
      width:8px; height:8px; border-radius:50%;
      background:var(--accent); flex-shrink:0;
    }

    .flight-card.primary .airline-dot { background:var(--green); box-shadow:0 0 8px var(--green); }
    .flight-card.private .airline-dot { background:var(--purple); }
    .flight-card.cargo .airline-dot { background:var(--amber); }

    .airline-name { font-size:11px; font-weight:500; color:var(--muted); white-space:nowrap; }
    .flight-card.primary .airline-name { color:var(--green); }
    .flight-card.private .airline-name { color:var(--purple); }
    .flight-card.cargo .airline-name { color:var(--amber); }

    .airline-logo {
      width:22px; height:22px; border-radius:5px;
      object-fit:contain; background:#fff;
      padding:2px; flex-shrink:0; display:none;
    }
    .airline-logo.loaded { display:block; }

    .horizon-tag {
      font-size:9px; font-family:'Inconsolata',monospace;
      color:var(--muted); background:var(--subtle);
      border-radius:5px; padding:2px 7px; margin-left:4px;
      letter-spacing:0.3px; white-space:nowrap; flex-shrink:0;
    }

    .callsign-tag {
      font-family:'Inconsolata',monospace; font-size:11px;
      color:var(--muted); background:var(--subtle);
      border-radius:6px; padding:3px 8px; flex-shrink:0;
    }

    .card-route { padding:10px 16px 14px; }

    /* Full route: BIG IATA codes */
    .route-airports { display:flex; align-items:center; margin-bottom:3px; }

    .airport-code {
      font-family:'Syne',sans-serif; font-size:30px; font-weight:800;
      letter-spacing:-1px; line-height:1; color:var(--text);
    }

    .flight-card.primary .airport-code { font-size:34px; }

    .route-arrow {
      flex:1; display:flex; align-items:center;
      padding:0 8px; position:relative;
    }

    .route-line {
      flex:1; height:1px;
      background:linear-gradient(90deg,var(--border),var(--accent),var(--border));
    }

    .route-plane {
      position:absolute; left:50%; transform:translateX(-50%);
      font-size:14px; top:-9px;
    }

    .airport-city {
      font-size:11px; color:var(--muted); margin-top:2px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
      max-width:110px;
    }

    /* Partial route: "Departed EDI" */
    .partial-route {
      display:flex; align-items:center; gap:12px; padding:6px 0 4px;
    }

    .partial-airport {
      font-family:'Syne',sans-serif; font-size:28px; font-weight:800;
      letter-spacing:-1px; line-height:1; color:var(--text);
    }

    .flight-card.primary .partial-airport { font-size:32px; }

    .partial-info { display:flex; flex-direction:column; gap:2px; }

    .partial-label {
      font-size:10px; color:var(--muted); font-family:'Inconsolata',monospace;
      letter-spacing:0.5px; text-transform:uppercase;
    }

    .partial-city { font-size:13px; color:var(--text); font-weight:500; }

    .partial-dest-unknown {
      font-size:11px; color:var(--muted); font-style:italic; margin-top:2px;
    }

    /* Non-commercial aircraft display */
    .aircraft-class-display { padding:8px 0 4px; }
    .aircraft-class-icon { font-size:28px; line-height:1; margin-bottom:4px; display:block; }
    .aircraft-class-name { font-family:'Syne',sans-serif; font-size:20px; font-weight:800; color:var(--text); letter-spacing:-0.5px; }
    .aircraft-class-detail { font-size:12px; color:var(--muted); margin-top:2px; }

    /* Badges */
    .dist-badge {
      display:inline-flex; align-items:center; gap:4px;
      background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2);
      border-radius:8px; padding:4px 8px;
      font-size:10px; font-family:'Inconsolata',monospace;
      color:var(--accent2); margin:0 16px 10px;
    }

    .eta-badge {
      display:inline-flex; align-items:center; gap:5px;
      background:rgba(16,185,129,0.1); border:1px solid rgba(16,185,129,0.2);
      border-radius:8px; padding:4px 10px;
      font-size:11px; font-family:'Inconsolata',monospace;
      color:var(--green); margin:0 16px 10px;
    }

    .aircraft-strip {
      padding:0 16px 10px; font-size:11px; color:var(--muted);
      font-family:'Inconsolata',monospace;
    }

    /* Stats */
    .card-stats {
      display:grid; grid-template-columns:repeat(4,1fr);
      border-top:1px solid var(--border);
    }

    .stat-cell { padding:10px 12px; border-right:1px solid var(--border); }
    .stat-cell:last-child { border-right:none; }

    .stat-l {
      font-size:9px; font-family:'Inconsolata',monospace;
      color:var(--muted); text-transform:uppercase;
      letter-spacing:0.5px; margin-bottom:3px;
    }

    .stat-v {
      font-family:'Inconsolata',monospace; font-size:13px;
      font-weight:500; color:var(--text); white-space:nowrap;
    }

    .stat-v .unit { font-size:9px; color:var(--muted); }

    .tap-hint {
      text-align:center; font-size:9px;
      font-family:'Inconsolata',monospace; color:var(--subtle);
      padding:5px 0 8px; letter-spacing:0.5px;
    }

    /* Drill panel */
    .drill-panel {
      display:none; border-top:1px solid var(--border);
      background:var(--surface2); padding:16px;
      animation:expandIn 0.2s ease;
    }

    @keyframes expandIn { from{opacity:0;transform:scaleY(0.95)} to{opacity:1;transform:scaleY(1)} }

    .drill-grid {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:12px; margin-bottom:14px;
    }

    .drill-cell .d-label {
      font-size:8px; font-family:'Inconsolata',monospace;
      color:var(--muted); text-transform:uppercase;
      letter-spacing:1px; margin-bottom:4px;
    }

    .drill-cell .d-val {
      font-family:'Inconsolata',monospace; font-size:14px; color:var(--text);
    }

    .compass-row {
      display:flex; align-items:center; gap:14px;
      padding-top:14px; border-top:1px solid var(--border);
    }

    .compass-wrap {
      width:54px; height:54px; flex-shrink:0;
      border:1px solid var(--border); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
    }

    .compass-arrow {
      font-size:26px; line-height:1; color:var(--accent2);
      filter:drop-shadow(0 0 4px var(--accent2));
      transition:transform 0.5s ease; display:block;
    }

    .compass-info { flex:1; }
    .compass-label { font-size:10px; font-family:'Inconsolata',monospace; color:var(--muted); margin-bottom:3px; }
    .compass-value { font-size:14px; font-family:'Inconsolata',monospace; color:var(--text); }
    .compass-sub { font-size:9px; color:var(--muted); margin-top:3px; font-style:italic; }

    /* States */
    .state-box { text-align:center; padding:48px 24px; color:var(--muted); }
    .state-icon { font-size:48px; margin-bottom:16px; display:block; }
    .state-title { font-family:'Syne',sans-serif; font-size:18px; color:var(--text); margin-bottom:8px; }
    .state-sub { font-size:13px; line-height:1.6; }

    .spinner {
      width:32px; height:32px;
      border:2px solid var(--border); border-top-color:var(--accent);
      border-radius:50%; animation:spin 0.7s linear infinite;
      margin:48px auto 16px;
    }

    @keyframes spin { to{transform:rotate(360deg)} }

    .spinner-label {
      text-align:center; font-size:12px;
      font-family:'Inconsolata',monospace; color:var(--muted);
    }

    .refresh-bar {
      margin-top:20px; display:flex; align-items:center;
      justify-content:center; gap:8px;
      font-size:11px; font-family:'Inconsolata',monospace; color:var(--muted);
    }

    .refresh-progress { width:60px; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
    .refresh-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 1s linear; }

    .error-card {
      background:rgba(239,68,68,0.05); border:1px solid rgba(239,68,68,0.2);
      border-radius:14px; padding:14px 16px;
      font-size:12px; color:#fca5a5; line-height:1.6;
      font-family:'Inconsolata',monospace; display:none; margin-bottom:16px;
      width:100%; max-width:340px;
    }

    /* Contextual book link on flight cards */
    .book-link {
      display:block; margin:0 0 4px;
      font-size:11px; font-family:'Inconsolata',monospace;
      color:var(--accent2); text-decoration:none;
      padding:4px 0;
      transition:color 0.2s;
    }
    .book-link:hover { color:var(--accent); }

    /* Bottom ad unit */
    .ad-unit {
      margin-top:16px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:14px; padding:12px 16px;
    }

    .ad-label {
      font-size:8px; font-family:'Inconsolata',monospace;
      color:var(--muted); letter-spacing:1.5px;
      text-transform:uppercase; margin-bottom:6px;
    }

    .ad-content {
      font-size:12px; color:var(--muted);
      display:flex; align-items:center; justify-content:space-between;
      flex-wrap:wrap; gap:8px;
    }

    .ad-link {
      font-size:12px; color:var(--accent2);
      text-decoration:none; font-weight:500;
      white-space:nowrap;
    }
    .ad-link:hover { color:var(--accent); }

    /* ── NAV TABS ────────────────────────────────────────────────────────── */

    .nav-tabs {
      display:flex; gap:8px; margin-bottom:20px;
    }

    .nav-tab {
      flex:1; padding:10px; border:1px solid var(--border);
      background:var(--surface); border-radius:12px;
      font-size:13px; font-weight:500; color:var(--muted);
      cursor:pointer; transition:all 0.2s; text-align:center;
      font-family:'Space Grotesk',sans-serif;
    }

    .nav-tab.active {
      background:var(--subtle); border-color:var(--accent);
      color:var(--text);
    }

    /* ── ALERT BANNER ────────────────────────────────────────────────────── */

    .alert-banner {
      display:none; position:fixed; top:16px; left:50%;
      transform:translateX(-50%); z-index:999;
      width:calc(100% - 32px); max-width:400px;
      background:linear-gradient(135deg,#052e16,#064e3b);
      border:1px solid var(--green);
      border-radius:16px; padding:14px 16px;
      animation:bannerIn 0.4s cubic-bezier(0.16,1,0.3,1);
      box-shadow:0 8px 32px rgba(16,185,129,0.3);
    }

    @keyframes bannerIn {
      from{opacity:0;transform:translateX(-50%) translateY(-20px)}
      to{opacity:1;transform:translateX(-50%) translateY(0)}
    }

    .alert-banner-title {
      font-size:13px; font-weight:600; color:var(--green);
      margin-bottom:4px; display:flex; align-items:center; gap:8px;
    }

    .alert-banner-body { font-size:12px; color:#6ee7b7; line-height:1.5; }

    .alert-banner-close {
      position:absolute; top:10px; right:12px;
      font-size:16px; color:var(--green); cursor:pointer;
      background:none; border:none; line-height:1;
    }

    /* ── WATCHLIST PANEL ─────────────────────────────────────────────────── */

    .watchlist-empty {
      text-align:center; padding:40px 16px; color:var(--muted);
    }

    .watchlist-empty-icon { font-size:40px; margin-bottom:12px; display:block; opacity:0.5; }
    .watchlist-empty-title { font-family:'Syne',sans-serif; font-size:18px; color:var(--text); margin-bottom:6px; }
    .watchlist-empty-sub { font-size:12px; line-height:1.7; }

    /* Add alert form */
    .add-alert-form {
      background:var(--surface); border:1px solid var(--border);
      border-radius:16px; padding:16px; margin-bottom:16px;
    }

    .form-title {
      font-size:12px; font-family:'Inconsolata',monospace;
      letter-spacing:1px; color:var(--muted); text-transform:uppercase;
      margin-bottom:12px;
    }

    .form-row { margin-bottom:12px; }

    .form-label {
      font-size:11px; color:var(--muted); margin-bottom:6px;
      display:block; font-family:'Inconsolata',monospace;
    }

    .form-select, .form-input {
      width:100%; background:var(--surface2);
      border:1px solid var(--border); border-radius:10px;
      padding:10px 12px; font-size:14px; color:var(--text);
      font-family:'Space Grotesk',sans-serif;
      appearance:none; -webkit-appearance:none;
      outline:none; transition:border-color 0.2s;
    }

    .form-select:focus, .form-input:focus { border-color:var(--accent); }

    .form-input::placeholder { color:var(--muted); }

    .add-btn {
      width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff; border:none; border-radius:12px;
      padding:13px; font-size:14px; font-weight:500;
      font-family:'Space Grotesk',sans-serif;
      cursor:pointer; transition:opacity 0.2s;
      margin-top:4px;
    }

    .add-btn:active { opacity:0.85; }

    /* Alert items */
    .alert-list { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }

    .alert-item {
      background:var(--surface); border:1px solid var(--border);
      border-radius:14px; padding:14px 16px;
      display:flex; align-items:center; gap:12px;
      animation:slideUp 0.3s ease both;
    }

    .alert-item.matched {
      border-color:rgba(16,185,129,0.4);
      background:linear-gradient(135deg,rgba(16,185,129,0.05),transparent);
    }

    .alert-icon { font-size:22px; flex-shrink:0; }

    .alert-info { flex:1; min-width:0; }

    .alert-type {
      font-size:9px; font-family:'Inconsolata',monospace;
      color:var(--muted); text-transform:uppercase;
      letter-spacing:1px; margin-bottom:3px;
    }

    .alert-value { font-size:15px; font-weight:600; color:var(--text); }

    .alert-status {
      font-size:10px; font-family:'Inconsolata',monospace;
      margin-top:3px;
    }

    .alert-status.on { color:var(--green); }
    .alert-status.off { color:var(--muted); }

    .alert-delete {
      background:none; border:1px solid var(--border);
      border-radius:8px; padding:6px 10px;
      font-size:12px; color:var(--muted);
      cursor:pointer; flex-shrink:0;
      transition:all 0.2s;
    }

    .alert-delete:hover { border-color:#ef4444; color:#ef4444; }

    /* ── TYPEAHEAD ───────────────────────────────────────────────────────── */

    .typeahead-wrap { position:relative; }

    .typeahead-dropdown {
      position:absolute; top:calc(100% + 4px); left:0; right:0;
      background:var(--surface2); border:1px solid var(--accent);
      border-radius:12px; overflow:hidden;
      z-index:200; max-height:220px; overflow-y:auto;
      box-shadow:0 8px 24px rgba(0,0,0,0.4);
      display:none;
    }

    .typeahead-dropdown.open { display:block; }

    .typeahead-item {
      padding:11px 14px; cursor:pointer;
      display:flex; align-items:center; gap:10px;
      transition:background 0.15s; border-bottom:1px solid var(--border);
    }

    .typeahead-item:last-child { border-bottom:none; }
    .typeahead-item:hover, .typeahead-item.focused { background:var(--subtle); }

    .typeahead-item-icon { font-size:16px; flex-shrink:0; }

    .typeahead-item-text { flex:1; min-width:0; }

    .typeahead-item-name {
      font-size:14px; color:var(--text); font-weight:500;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .typeahead-item-name em {
      color:var(--accent2); font-style:normal; font-weight:700;
    }

    .typeahead-item-tag {
      font-size:9px; font-family:'Inconsolata',monospace;
      color:var(--muted); letter-spacing:0.5px; margin-top:1px;
    }

    .typeahead-no-results {
      padding:12px 14px; font-size:13px; color:var(--muted);
      font-style:italic;
    }
  </style>
</head>
<body>
<div class="app">

  <!-- HERO -->
  <div id="heroScreen">
    <div class="hero-top">
      <div class="hero-logo">✈</div>
      <div class="hero-title">Overhead</div>
      <div class="hero-sub">What's flying above you right now?</div>
    </div>
    <div class="radar-wrap">
      <div class="radar">
        <div class="radar-ring r1"></div>
        <div class="radar-ring r2"></div>
        <div class="radar-ring r3"></div>
        <div class="radar-sweep"></div>
        <div class="radar-centre"></div>
        <div class="radar-blip b1">✈</div>
        <div class="radar-blip b2">✈</div>

  <!-- Sky tab content -->
  <div id="skyTab">
    <div id="mainContent"></div>
    <div class="refresh-bar" id="refreshBar" style="display:none">
      <span id="refreshLabel">refreshing in 15s</span>
      <div class="refresh-progress"><div class="refresh-fill" id="refreshFill" style="width:100%"></div></div>
    </div>
  </div>

  <!-- Watchlist tab content -->
  <div id="watchTab" style="display:none">
    <div class="add-alert-form">
      <div class="form-title">🔔 Add New Alert</div>
      <div class="form-row">
        <label class="form-label">Alert me when...</label>
        <select class="form-select" id="alertType" onchange="updateAlertPlaceholder()">
          <option value="airline">A specific airline flies over</option>
          <option value="destination">A flight heading to a city flies over</option>
          <option value="origin">A flight departing from a city flies over</option>
          <option value="callsign">A specific flight number flies over</option>
          <option value="aircraft">A specific aircraft type flies over</option>
        </select>
      </div>
      <div class="form-row">
        <label class="form-label" id="alertValueLabel">Airline name</label>
        <div class="typeahead-wrap">
          <input class="form-input" id="alertValue" type="text"
            placeholder="e.g. British Airways"
            autocomplete="off"
            oninput="typeaheadInput()"
            onkeydown="typeaheadKey(event)"
            onfocus="typeaheadInput()"
            onblur="setTimeout(closeTypeahead,150)" />
          <div class="typeahead-dropdown" id="typeaheadDropdown"></div>
        </div>
      </div>
      <button class="add-btn" onclick="addAlert()">+ Add Alert</button>
    </div>
    <div id="alertList"></div>
  </div>

</div>
<script>

// ── Lookup tables ─────────────────────────────────────────────────────────────

const AIRLINES = {
  EZY:'easyJet',BAW:'British Airways',RYR:'Ryanair',TOM:'TUI Airways',
  TCX:'TUI Airways',VIR:'Virgin Atlantic',EXS:'Jet2',DLH:'Lufthansa',
  AFR:'Air France',KLM:'KLM',IBE:'Iberia',AZA:'ITA Airways',
  UAE:'Emirates',QTR:'Qatar Airways',ETD:'Etihad',SIA:'Singapore Airlines',
  AAL:'American Airlines',UAL:'United Airlines',DAL:'Delta Air Lines',
  SWA:'Southwest',ACA:'Air Canada',WJA:'WestJet',QFA:'Qantas',
  ANZ:'Air New Zealand',CPA:'Cathay Pacific',ANA:'ANA',JAL:'Japan Airlines',
  CSN:'China Southern',CCA:'Air China',THY:'Turkish Airlines',
  AEE:'Aegean Airlines',BEL:'Brussels Airlines',SAS:'Scandinavian Airlines',
  FIN:'Finnair',TAP:'TAP Air Portugal',LOT:'LOT Polish',WZZ:'Wizz Air',
  VLG:'Vueling',IBX:'Iberia Express',EIN:'Aer Lingus',LOG:'Loganair',
  TRA:'Transavia',SXS:'SunExpress',FDB:'flydubai',GFA:'Gulf Air',
  SVA:'Saudia',MSR:'EgyptAir',RAM:'Royal Air Maroc',ETH:'Ethiopian',
  KQA:'Kenya Airways',NKS:'Spirit',FFT:'Frontier',FDX:'FedEx',
  UPS:'UPS Airlines',DHL:'DHL Air',BMI:'BMI Regional',ENT:'Enter Air',
};

const CITIES = {
  LHR:'London',LGW:'London',STN:'London',LTN:'London',LCY:'London',
  MAN:'Manchester',BHX:'Birmingham',EDI:'Edinburgh',GLA:'Glasgow',
  BRS:'Bristol',NCL:'Newcastle',LBA:'Leeds',EMA:'East Midlands',
  ABZ:'Aberdeen',INV:'Inverness',BFS:'Belfast',DUB:'Dublin',
  CDG:'Paris',ORY:'Paris',AMS:'Amsterdam',FRA:'Frankfurt',
  MUC:'Munich',BCN:'Barcelona',MAD:'Madrid',FCO:'Rome',
  MXP:'Milan',ZRH:'Zurich',VIE:'Vienna',CPH:'Copenhagen',
  ARN:'Stockholm',OSL:'Oslo',HEL:'Helsinki',LIS:'Lisbon',
  ATH:'Athens',IST:'Istanbul',DXB:'Dubai',AUH:'Abu Dhabi',
  DOH:'Doha',JFK:'New York',LAX:'Los Angeles',ORD:'Chicago',
  ATL:'Atlanta',DFW:'Dallas',MIA:'Miami',BOS:'Boston',
  SFO:'San Francisco',YYZ:'Toronto',SYD:'Sydney',SIN:'Singapore',
  HKG:'Hong Kong',NRT:'Tokyo',HND:'Tokyo',ICN:'Seoul',
  PEK:'Beijing',PVG:'Shanghai',BKK:'Bangkok',DEL:'Delhi',BOM:'Mumbai',
};

const CARGO_CALLSIGNS = ['FDX','UPS','DHL','TNT','RFL','TAY','NPT','STN'];
const MILITARY_PREFIXES = ['RRR','RAF','MIL','NATO','USAF','ARMY','NAVY','GAF','BAF'];

const AIRPORT_COORDS = {
  LHR:[51.477,-0.461],LGW:[51.148,-0.190],STN:[51.885,0.235],LTN:[51.874,-0.368],
  LCY:[51.505,0.055],MAN:[53.354,-2.275],BHX:[52.454,-1.748],EDI:[55.950,-3.373],
  GLA:[55.871,-4.433],BRS:[51.382,-2.719],NCL:[55.038,-1.692],LBA:[53.866,-1.660],
  ABZ:[57.202,-2.198],BFS:[54.657,-6.216],DUB:[53.421,-6.270],
  CDG:[49.009,2.548],ORY:[48.723,2.380],AMS:[52.308,4.764],FRA:[50.033,8.571],
  MUC:[48.354,11.786],BCN:[41.297,2.078],MAD:[40.472,-3.561],FCO:[41.800,12.239],
  MXP:[45.630,8.723],ZRH:[47.458,8.548],VIE:[48.110,16.570],CPH:[55.618,12.656],
  ARN:[59.652,17.919],OSL:[60.194,11.100],HEL:[60.317,24.963],LIS:[38.774,-9.134],
  ATH:[37.936,23.944],IST:[41.275,28.752],DXB:[25.253,55.365],DOH:[25.261,51.565],
  JFK:[40.640,-73.779],LAX:[33.943,-118.408],ORD:[41.978,-87.905],ATL:[33.641,-84.427],
  SFO:[37.619,-122.375],YYZ:[43.677,-79.631],SYD:[-33.946,151.177],
  SIN:[1.359,103.989],HKG:[22.308,113.918],NRT:[35.765,140.386],ICN:[37.460,126.441],
};

// ── State ─────────────────────────────────────────────────────────────────────

let userLat=null, userLon=null, compassHeading=null;
let countdown=15, countdownTimer=null;
const REFRESH=15, MIN_SPD=50;

// ── Clock ─────────────────────────────────────────────────────────────────────

function tickClock() {
  const t=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const el=document.getElementById('heroClock');
  if(el) el.textContent=t;
}
tickClock(); setInterval(tickClock,1000);

// ── Helpers ───────────────────────────────────────────────────────────────────

function setLive(on,label) {
  const p=document.getElementById('livePill');
  if(!p) return;
  p.className='live-pill'+(on?' active':'');
  document.getElementById('liveLabel').textContent=label||(on?'live':'offline');
}

function showError(msg) {
  const el=document.getElementById('errorCard');
  el.textContent=msg; el.style.display=msg?'block':'none';
}

function distKm(la1,lo1,la2,lo2) {
  const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function guessAirline(cs) {
  if(!cs) return null;
  return AIRLINES[cs.replace(/[0-9\s]/g,'').toUpperCase()]||null;
}

function cityFor(iata) { return iata?(CITIES[iata]||null):null; }
function compassDir(deg) { return['N','NE','E','SE','S','SW','W','NW'][Math.round(deg/45)%8]; }
function staticArrow(b)  { return['↑','↗','→','↘','↓','↙','←','↖'][Math.round(b/45)%8]; }

// ── Route sanity check removed ────────────────────────────────────────────────
// We trust adsbdb's route data as-is. Trying to second-guess it with geometry
// caused more problems than it solved.

// ── Classification ────────────────────────────────────────────────────────────

function classifyAircraft(f) {
  const cs=(f.callsign||'').toUpperCase();
  const type=(f.acInfo?.type||f.acInfo?.icaoType||f.t||'').toUpperCase();
  const spd=f.gs||0, alt=f.alt_baro||0;
  if(MILITARY_PREFIXES.some(p=>cs.startsWith(p)))
    return{label:'Military Aircraft',icon:'🎖️',detail:'Military / government flight',cardClass:'military'};
  if(CARGO_CALLSIGNS.some(p=>cs.startsWith(p)))
    return{label:'Cargo Flight',icon:'📦',detail:'Freight / cargo operation',cardClass:'cargo'};
  if(['H60','EC35','EC45','B06','R44','R22','AS50','S76','AW139','H145'].some(t=>type.includes(t))||(spd<150&&alt<5000))
    return{label:'Helicopter',icon:'🚁',detail:type||'Rotary wing aircraft',cardClass:'private'};
  if(spd<200&&alt<10000)
    return{label:'Light Aircraft',icon:'🛩️',detail:type?`${type} · Private or training flight`:'Small private or training aircraft',cardClass:'private'};
  if(spd>=300&&alt>20000)
    return{label:'Private Jet',icon:'✈️',detail:type?`${type} · Business aviation`:'Business jet · Private flight',cardClass:'private'};
  return{label:'Private Aircraft',icon:'🛩️',detail:type?`${type} · General aviation`:'General aviation flight',cardClass:'private'};
}

// ── ETA ───────────────────────────────────────────────────────────────────────

function etaMinutes(f,toLat,toLon) {
  if(!f.gs||f.gs<50||!toLat||!toLon) return null;
  const remainKm=distKm(f.lat,f.lon,toLat,toLon);
  return Math.round((remainKm/(f.gs*1.852))*60);
}

function formatEta(mins) {
  if(mins===null||mins<0) return null;
  if(mins<2) return 'Landing soon';
  if(mins<60) return `~${mins} min to land`;
  return `~${Math.floor(mins/60)}h ${mins%60}m to land`;
}

// ── Compass ───────────────────────────────────────────────────────────────────

function initCompass() {
  if(typeof DeviceOrientationEvent==='undefined') return;
  const listen=()=>{
    window.addEventListener('deviceorientationabsolute',onOrient,true);
    window.addEventListener('deviceorientation',onOrient,true);
  };
  if(typeof DeviceOrientationEvent.requestPermission==='function') {
    DeviceOrientationEvent.requestPermission().then(s=>{if(s==='granted')listen();}).catch(()=>{});
  } else {listen();}
}

function onOrient(e) {
  if(e.webkitCompassHeading!=null) compassHeading=e.webkitCompassHeading;
  else if(e.alpha!=null) compassHeading=(360-e.alpha+360)%360;
  updateArrows();
}

function bearingTo(lat2,lon2) {
  if(userLat==null) return null;
  const dL=(lon2-userLon)*Math.PI/180,la1=userLat*Math.PI/180,la2=lat2*Math.PI/180;
  const y=Math.sin(dL)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dL);
  return((Math.atan2(y,x)*180/Math.PI)+360)%360;
}

function relAngle(b) {
  if(compassHeading==null) return null;
  return((b-compassHeading)+360)%360;
}

function updateArrows() {
  document.querySelectorAll('.compass-arrow[data-bearing]').forEach(el=>{
    const rel=relAngle(parseFloat(el.dataset.bearing));
    if(rel!=null) el.style.transform=`rotate(${rel}deg)`;
  });
}

// ── Tracking ──────────────────────────────────────────────────────────────────

function startTracking() {
  const btn=document.getElementById('heroBtn');
  btn.disabled=true; btn.innerHTML='<span>📡</span> Getting location…';
  showError('');
  navigator.geolocation.getCurrentPosition(
    pos=>{
      userLat=pos.coords.latitude; userLon=pos.coords.longitude;
      document.getElementById('heroScreen').style.display='none';
      document.getElementById('postScan').style.display='block';
      document.getElementById('scanBtn').style.display='block';
      document.getElementById('locationInfo').textContent=
        `${userLat.toFixed(4)}°N  ${Math.abs(userLon).toFixed(4)}°${userLon<0?'W':'E'}`;
      initCompass(); fetchFlights();
    },
    ()=>{
      showError('Location denied — please allow in browser settings and try again');
      btn.disabled=false; btn.innerHTML='<span>📍</span> Scan the Sky Above Me';
    },
    {enableHighAccuracy:true}
  );
}

function startCountdown() {
  clearInterval(countdownTimer); countdown=REFRESH;
  const fill=document.getElementById('refreshFill');
  const label=document.getElementById('refreshLabel');
  document.getElementById('refreshBar').style.display='flex';
  countdownTimer=setInterval(()=>{
    countdown--;
    fill.style.width=(countdown/REFRESH*100)+'%';
    label.textContent=`refreshing in ${countdown}s`;
    if(countdown<=0){clearInterval(countdownTimer);fetchFlights();}
  },1000);
}

// ── API calls ─────────────────────────────────────────────────────────────────

async function lookupRoute(cs) {
  if(!cs) return null;
  try {
    const r=await fetch(`https://api.adsbdb.com/v0/callsign/${cs.trim()}`);
    if(!r.ok) return null;
    const d=await r.json();
    const rt=d?.response?.flightroute;
    if(!rt) return null;
    return {
      from:     rt.origin?.iata_code||rt.origin?.icao_code||null,
      to:       rt.destination?.iata_code||rt.destination?.icao_code||null,
      fromCity: rt.origin?.municipality||null,
      toCity:   rt.destination?.municipality||null,
      airline:  rt.airline?.name||null,
      originLat:  rt.origin?.latitude||null,
      originLon:  rt.origin?.longitude||null,
      destLat:    rt.destination?.latitude||null,
      destLon:    rt.destination?.longitude||null,
    };
  } catch{return null;}
}

async function lookupAircraft(hex) {
  if(!hex) return null;
  try {
    const r=await fetch(`https://api.adsbdb.com/v0/aircraft/${hex}`);
    if(!r.ok) return null;
    const d=await r.json();
    const a=d?.response?.aircraft;
    if(!a) return null;
    return{type:a.type||null,icaoType:a.icao_type||null,reg:a.registration||null};
  } catch{return null;}
}

async function fetchFlights() {
  if(!userLat) return;
  showError(''); setLive(false,'scanning');
  document.getElementById('refreshBar').style.display='none';
  document.getElementById('mainContent').innerHTML=
    '<div class="spinner"></div><div class="spinner-label">scanning the skies…</div>';

  try {
    const res=await fetch(`https://api.airplanes.live/v2/point/${userLat}/${userLon}/30`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();

    const airborne=(data.ac||[])
      .filter(a=>{
        if(a.on_ground) return false;
        if(a.gs!=null&&a.gs<MIN_SPD) return false;
        if(a.alt_baro!=null&&a.alt_baro<300) return false;
        return a.lat&&a.lon;
      })
      .map(a=>({...a,dist:distKm(userLat,userLon,a.lat,a.lon)}))
      .sort((a,b)=>a.dist-b.dist)
      .slice(0,5);

    if(!airborne.length) {
      document.getElementById('mainContent').innerHTML=`
        <div class="state-box">
          <span class="state-icon">🌤️</span>
          <div class="state-title">Clear skies</div>
          <div class="state-sub">No airborne aircraft within 30km right now</div>
        </div>`;
      setLive(true,'live'); startCountdown(); return;
    }

    const enriched=await Promise.all(airborne.map(async a=>{
      const callsign=(a.flight||'').trim();
      const [route,acInfo]=await Promise.all([lookupRoute(callsign),lookupAircraft(a.hex)]);
      return{...a,callsign,route,acInfo};
    }));

    setLive(true,'live · '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    renderCards(enriched);
    checkAlerts(enriched);
    startCountdown();
  } catch(e) {
    showError(`Could not fetch: ${e.message}`);
    document.getElementById('mainContent').innerHTML='';
    setLive(false,'error'); startCountdown();
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderCards(flights) {
  const content=document.getElementById('mainContent');

  const cards=flights.map((f,i)=>{
    const isPrimary=i===0;
    const cs=f.callsign||f.hex||'?????';
    const acType=f.acInfo?.type||f.acInfo?.icaoType||f.t||null;
    const reg=f.acInfo?.reg||f.r||null;
    const alt=f.alt_baro?Math.round(f.alt_baro).toLocaleString():'—';
    const spd=f.gs?Math.round(f.gs):'—';
    const hdg=f.track!=null?Math.round(f.track)+'°':'—';
    const dist=f.dist.toFixed(1);
    const distNum=parseFloat(dist);

    // ── Route resolution ──────────────────────────────────────────────────
    let from=f.route?.from||null;
    let to=f.route?.to||null;
    let fromCity=f.route?.fromCity||cityFor(from)||from;
    let toCity=f.route?.toCity||cityFor(to)||to;
    let airline=f.route?.airline||guessAirline(cs)||null;

    // Determine display mode:
    // 'full'    — we have both from and to
    // 'partial' — we only have origin (helicopter / short hop)
    // 'class'   — nothing known, show aircraft classification
    const hasFullRoute = !!(from && to && airline);
    const hasPartialRoute = !!(from && !to);

    const classification = (!hasFullRoute) ? classifyAircraft(f) : null;
    const cardClass = classification ? classification.cardClass : '';

    // ETA
    let etaStr=null;
    if(to && f.gs) {
      let dLat=f.route?.destLat, dLon=f.route?.destLon;
      if((!dLat||!dLon) && AIRPORT_COORDS[to]) { dLat=AIRPORT_COORDS[to][0]; dLon=AIRPORT_COORDS[to][1]; }
      if(dLat&&dLon) etaStr=formatEta(etaMinutes(f,dLat,dLon));
    }

    // Compass
    const bearing=bearingTo(f.lat,f.lon);
    const initRel=(compassHeading!=null&&bearing!=null)?relAngle(bearing):null;
    const initStyle=initRel!=null?`style="transform:rotate(${initRel}deg)"`:' ';
    const bAttr=bearing!=null?`data-bearing="${bearing.toFixed(1)}"`:' ';
    const arrow=bearing!=null?staticArrow(bearing):'✈';

    // Airline label + logo
    const airlineLabel = hasFullRoute ? airline : (hasPartialRoute ? (airline||guessAirline(cs)||'Unknown') : classification.label);
    const icaoPrefix = cs.replace(/[0-9\s]/g,'').toUpperCase();
    const logoUrl = (hasFullRoute||hasPartialRoute) && icaoPrefix
      ? `https://www.flightaware.com/images/airline_logos/90p/${icaoPrefix}.png` : null;

    // Distance tag
    const horizonTag=distNum>20
      ?'<span class="horizon-tag">on the horizon</span>'
      :distNum>10?'<span class="horizon-tag">nearby</span>':'';

    // ── Route HTML ────────────────────────────────────────────────────────
    let routeHtml;

    if(hasFullRoute) {
      // Full origin → destination
      routeHtml=`
        <div class="route-airports">
          <div>
            <div class="airport-code">${from}</div>
            ${fromCity?`<div class="airport-city">${fromCity}</div>`:''}
          </div>
          <div class="route-arrow">
            <div class="route-line"></div>
            <div class="route-plane">✈</div>
          </div>
          <div style="text-align:right">
            <div class="airport-code">${to}</div>
            ${toCity?`<div class="airport-city" style="text-align:right">${toCity}</div>`:''}
          </div>
        </div>
        <a class="book-link" href="https://www.skyscanner.net/routes/${from}/${to}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
          🔍 Search ${from} → ${to} flights
        </a>`;

    } else if(hasPartialRoute) {
      // Only departure known — e.g. helicopter
      const depCity = fromCity || cityFor(from) || from;
      routeHtml=`
        <div class="partial-route">
          <div class="partial-airport">${from}</div>
          <div class="partial-info">
            <div class="partial-label">Departed</div>
            ${depCity?`<div class="partial-city">${depCity}</div>`:''}
            <div class="partial-dest-unknown">Destination unknown</div>
          </div>
        </div>`;

    } else {
      // No route at all — show aircraft classification
      routeHtml=`
        <div class="aircraft-class-display">
          <span class="aircraft-class-icon">${classification.icon}</span>
          <div class="aircraft-class-name">${classification.label}</div>
          <div class="aircraft-class-detail">${classification.detail}</div>
        </div>`;
    }

    return `
      <div class="flight-card ${isPrimary?'primary':''} ${cardClass}" style="animation-delay:${i*0.06}s" onclick="toggleDrill('drill-${i}')">
        <div class="card-strip">
          <div class="airline-badge">
            <div class="airline-dot"></div>
            ${logoUrl?`<img class="airline-logo" src="${logoUrl}" alt="" onload="this.classList.add('loaded')" onerror="this.style.display='none'">`:''}
            <div class="airline-name">${airlineLabel}${horizonTag}</div>
          </div>
          <div class="callsign-tag">${cs}</div>
        </div>
        <div class="card-route">${routeHtml}</div>
        ${isPrimary?`<div class="dist-badge">📍 ${dist} km · ${distNum<10?'directly overhead':'closest aircraft'}</div>`:''}
        ${etaStr?`<div class="eta-badge">🛬 ${etaStr}</div>`:''}
        ${(acType||reg)?`<div class="aircraft-strip">🛩 ${[acType,reg].filter(Boolean).join(' · ')}</div>`:''}
        <div class="card-stats">
          <div class="stat-cell"><div class="stat-l">Alt</div><div class="stat-v">${alt}<span class="unit"> ft</span></div></div>
          <div class="stat-cell"><div class="stat-l">Speed</div><div class="stat-v">${spd}<span class="unit"> kts</span></div></div>
          <div class="stat-cell"><div class="stat-l">Hdg</div><div class="stat-v">${hdg}</div></div>
          <div class="stat-cell"><div class="stat-l">Dist</div><div class="stat-v">${dist}<span class="unit"> km</span></div></div>
        </div>
        <div class="tap-hint">tap for more ↓</div>
        <div class="drill-panel" id="drill-${i}">
          <div class="drill-grid">
            ${fromCity&&fromCity!==from?`<div class="drill-cell"><div class="d-label">${hasPartialRoute?'Departed':'From'}</div><div class="d-val">${fromCity}</div></div>`:''}
            ${toCity&&toCity!==to?`<div class="drill-cell"><div class="d-label">To</div><div class="d-val">${toCity}</div></div>`:''}
            ${acType?`<div class="drill-cell"><div class="d-label">Aircraft</div><div class="d-val">${acType}</div></div>`:''}
            ${reg?`<div class="drill-cell"><div class="d-label">Reg</div><div class="d-val">${reg}</div></div>`:''}
            <div class="drill-cell"><div class="d-label">Bearing</div><div class="d-val">${bearing!=null?Math.round(bearing)+'° '+compassDir(bearing):'—'}</div></div>
            ${etaStr?`<div class="drill-cell"><div class="d-label">ETA</div><div class="d-val" style="font-size:12px">${etaStr}</div></div>`:''}
          </div>
          <div class="compass-row">
            <div class="compass-wrap">
              <span class="compass-arrow" ${bAttr} ${initStyle}>${arrow}</span>
            </div>
            <div class="compass-info">
              <div class="compass-label">LOOK THIS WAY</div>
              <div class="compass-value">${bearing!=null?Math.round(bearing)+'° '+compassDir(bearing):'—'}</div>
              <div class="compass-sub">${compassHeading!=null?'Arrow updates with your phone orientation':'Hold phone flat · arrow points at aircraft'}</div>
            </div>
          </div>
        </div>
      </div>`;
  }).join('');

  content.innerHTML=`
    <div class="section-label">aircraft overhead</div>
    <div class="flights-list">${cards}</div>
    <div class="ad-unit">
      <div class="ad-label">TRAVEL DEALS</div>
      <div class="ad-content">
        ✈ Search flights from your nearest airport
        <a class="ad-link" href="https://www.skyscanner.net" target="_blank" rel="noopener">Compare on Skyscanner →</a>
      </div>
    </div>`;
}

function toggleDrill(id) {
  const el=document.getElementById(id);
  if(!el) return;
  const isOpen=el.style.display==='block';
  document.querySelectorAll('.drill-panel').forEach(p=>{p.style.display='none';});
  if(!isOpen) el.style.display='block';
}

// ── Tab switching ─────────────────────────────────────────────────────────────

function switchTab(tab) {
  const isSky = tab === 'sky';
  document.getElementById('skyTab').style.display   = isSky ? 'block' : 'none';
  document.getElementById('watchTab').style.display = isSky ? 'none'  : 'block';
  document.getElementById('scanBtn').style.display  = isSky ? 'block' : 'none';
  document.getElementById('tabSky').className   = 'nav-tab' + (isSky  ? ' active' : '');
  document.getElementById('tabWatch').className = 'nav-tab' + (!isSky ? ' active' : '');
  if(!isSky) renderAlertList();
}

    {name:'Bell 206',         tag:'Helicopter · light turbine', icon:'🚁'},
    {name:'Eurofighter Typhoon', tag:'Military fighter', icon:'🎖️'},
    {name:'F-16 Fighting Falcon', tag:'Military fighter · USAF', icon:'🎖️'},
    {name:'F-35 Lightning II',   tag:'Military stealth fighter', icon:'🎖️'},
    {name:'Lockheed C-130',  tag:'Military transport', icon:'🎖️'},
    {name:'Boeing C-17',     tag:'Military transport · heavy', icon:'🎖️'},
    {name:'BAE Hawk',        tag:'Military trainer · RAF', icon:'🎖️'},
    {name:'Panavia Tornado', tag:'Military · RAF retired', icon:'🎖️'},
  ],
};

const ALERT_META = {
  airline:     { label:'Airline name',       placeholder:'Start typing an airline…', icon:'✈️' },
  destination: { label:'Destination city or airport code', placeholder:'e.g. Dubai or DXB', icon:'🛬' },
  origin:      { label:'Departure city or airport code',   placeholder:'e.g. Edinburgh or EDI', icon:'🛫' },
  callsign:    { label:'Flight number',      placeholder:'e.g. BAW123 or EZY456', icon:'🔢' },
  aircraft:    { label:'Aircraft type',      placeholder:'Start typing an aircraft…', icon:'🛩️' },
};

function updateAlertPlaceholder() {
  const type = document.getElementById('alertType').value;
  const meta = ALERT_META[type];
  document.getElementById('alertValueLabel').textContent = meta.label;
  document.getElementById('alertValue').placeholder = meta.placeholder;
  document.getElementById('alertValue').value = '';
  closeTypeahead();
}

// ── Typeahead ─────────────────────────────────────────────────────────────────

let typeaheadFocusIndex = -1;

function typeaheadInput() {
  const type  = document.getElementById('alertType').value;
  const query = document.getElementById('alertValue').value.trim().toLowerCase();
  const items = SUGGESTIONS[type] || [];

  if(!items.length || query.length === 0) { closeTypeahead(); return; }

  const matches = items.filter(s =>
    s.name.toLowerCase().includes(query) || s.tag.toLowerCase().includes(query)
  ).slice(0, 8);

  const dd = document.getElementById('typeaheadDropdown');

  if(!matches.length) {
    dd.innerHTML = '<div class="typeahead-no-results">No matches — try a different spelling</div>';
    dd.classList.add('open');
    return;
  }

  typeaheadFocusIndex = -1;
  dd.innerHTML = matches.map((s, i) => {
    // Bold the matching part
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    const highlighted = s.name.replace(re, '<em>$1</em>');
    return `
      <div class="typeahead-item" data-value="${s.name}" onmousedown="pickSuggestion('${s.name.replace(/'/g,"\\'")}')">
        <div class="typeahead-item-icon">${s.icon}</div>
        <div class="typeahead-item-text">
          <div class="typeahead-item-name">${highlighted}</div>
          <div class="typeahead-item-tag">${s.tag}</div>
        </div>
      </div>`;
  }).join('');

  dd.classList.add('open');
}

function typeaheadKey(e) {
  const dd = document.getElementById('typeaheadDropdown');
  const items = dd.querySelectorAll('.typeahead-item');
  if(!items.length) return;

  if(e.key === 'ArrowDown') {
    e.preventDefault();
    typeaheadFocusIndex = Math.min(typeaheadFocusIndex + 1, items.length - 1);
    items.forEach((el,i) => el.classList.toggle('focused', i === typeaheadFocusIndex));
  } else if(e.key === 'ArrowUp') {
    e.preventDefault();
    typeaheadFocusIndex = Math.max(typeaheadFocusIndex - 1, 0);
    items.forEach((el,i) => el.classList.toggle('focused', i === typeaheadFocusIndex));
  } else if(e.key === 'Enter') {
    e.preventDefault();
    if(typeaheadFocusIndex >= 0 && items[typeaheadFocusIndex]) {
      pickSuggestion(items[typeaheadFocusIndex].dataset.value);
    } else {
      addAlert();
    }
  } else if(e.key === 'Escape') {
    closeTypeahead();
  }
}

function pickSuggestion(value) {
  document.getElementById('alertValue').value = value;
  closeTypeahead();
}

function closeTypeahead() {
  document.getElementById('typeaheadDropdown').classList.remove('open');
  typeaheadFocusIndex = -1;
}

// ── Watchlist storage ─────────────────────────────────────────────────────────

function loadAlerts() {
  try { return JSON.parse(localStorage.getItem('overhead_alerts')||'[]'); }
  catch { return []; }
}

function saveAlerts(alerts) {
  localStorage.setItem('overhead_alerts', JSON.stringify(alerts));
}

function addAlert() {
  const type  = document.getElementById('alertType').value;
  const value = document.getElementById('alertValue').value.trim();
  if(!value) { document.getElementById('alertValue').focus(); return; }

  const alerts = loadAlerts();
  alerts.push({
    id: Date.now(),
    type,
    value,
    icon: ALERT_META[type].icon,
    lastMatched: null,
    matchCount: 0,
  });
  saveAlerts(alerts);
  document.getElementById('alertValue').value = '';
  renderAlertList();

  // Request browser notification permission
  if('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function deleteAlert(id) {
  saveAlerts(loadAlerts().filter(a => a.id !== id));
  renderAlertList();
}

function renderAlertList() {
  const alerts = loadAlerts();
  const container = document.getElementById('alertList');

  if(!alerts.length) {
    container.innerHTML = `
      <div class="watchlist-empty">
        <span class="watchlist-empty-icon">🔔</span>
        <div class="watchlist-empty-title">No alerts yet</div>
        <div class="watchlist-empty-sub">Add an alert above and we'll notify you<br>whenever a matching flight passes overhead</div>
      </div>`;
    return;
  }

  container.innerHTML = `<div class="alert-list">${alerts.map(a => {
    const isMatched = a.lastMatched && (Date.now() - a.lastMatched < 120000); // matched in last 2 mins
    const typeLabel = ALERT_META[a.type]?.label || a.type;
    const statusText = isMatched
      ? `🟢 Overhead right now!`
      : a.matchCount > 0
        ? `Last matched ${formatTimeAgo(a.lastMatched)}`
        : 'Watching · no matches yet';

    return `
      <div class="alert-item ${isMatched?'matched':''}">
        <div class="alert-icon">${a.icon}</div>
        <div class="alert-info">
          <div class="alert-type">${typeLabel}</div>
          <div class="alert-value">${a.value}</div>
          <div class="alert-status ${isMatched?'on':'off'}">${statusText}</div>
        </div>
        <button class="alert-delete" onclick="deleteAlert(${a.id})">✕</button>
      </div>`;
  }).join('')}</div>`;
}

function formatTimeAgo(ts) {
  if(!ts) return 'never';
  const mins = Math.round((Date.now()-ts)/60000);
  if(mins < 1)  return 'just now';
  if(mins < 60) return `${mins}m ago`;
  return `${Math.floor(mins/60)}h ago`;
}

// ── Alert matching ────────────────────────────────────────────────────────────
// Called after each fetchFlights() with the enriched flight array

function checkAlerts(flights) {
  const alerts = loadAlerts();
  if(!alerts.length) return;

  let anyMatched = false;
  let matchedAlert = null;
  let matchedFlight = null;

  alerts.forEach(alert => {
    const v = alert.value.toLowerCase();

    flights.forEach(f => {
      const airline   = (f.route?.airline || guessAirline(f.callsign) || '').toLowerCase();
      const to        = (f.route?.to || '').toLowerCase();
      const toCity    = (f.route?.toCity || cityFor(f.route?.to) || '').toLowerCase();
      const from      = (f.route?.from || '').toLowerCase();
      const fromCity  = (f.route?.fromCity || cityFor(f.route?.from) || '').toLowerCase();
      const callsign  = (f.callsign || '').toLowerCase();
      const acType    = (f.acInfo?.type || f.acInfo?.icaoType || f.t || '').toLowerCase();

      let matched = false;

      if(alert.type === 'airline') {
        // Handle generic class alerts
        const v2 = alert.value.toLowerCase();
        if(v2 === 'any helicopter')        matched = (f.gs||0)<150 && (f.alt_baro||0)<5000;
        else if(v2 === 'any private jet')  matched = (f.gs||0)>=300 && (f.alt_baro||0)>20000 && !airline;
        else if(v2 === 'any light aircraft') matched = (f.gs||0)<200 && (f.alt_baro||0)<10000 && !airline;
        else if(v2 === 'any cargo flight') matched = CARGO_CALLSIGNS.some(p=>callsign.toUpperCase().startsWith(p));
        else if(v2 === 'any military aircraft') matched = MILITARY_PREFIXES.some(p=>callsign.toUpperCase().startsWith(p));
        else if(v2 === 'any private aircraft') matched = !airline && (f.gs||0)>50;
        else matched = airline.includes(v);
      }
      if(alert.type === 'destination')  matched = to.includes(v) || toCity.includes(v);
      if(alert.type === 'origin')       matched = from.includes(v) || fromCity.includes(v);
      if(alert.type === 'callsign')     matched = callsign.includes(v);
      if(alert.type === 'aircraft')     matched = acType.includes(v);

      if(matched) {
        alert.lastMatched = Date.now();
        alert.matchCount = (alert.matchCount||0) + 1;
        anyMatched = true;
        if(!matchedAlert) { matchedAlert = alert; matchedFlight = f; }
      }
    });
  });

  saveAlerts(alerts);

  if(anyMatched && matchedFlight) {
    fireAlert(matchedAlert, matchedFlight);
  }

  // Re-render list if on watchlist tab
  if(document.getElementById('watchTab').style.display !== 'none') {
    renderAlertList();
  }
}

function fireAlert(alert, flight) {
  const airline = flight.route?.airline || guessAirline(flight.callsign) || 'Unknown';
  const from    = flight.route?.from || '?';
  const to      = flight.route?.to   || '?';
  const dist    = flight.dist?.toFixed(1) || '?';
  const route   = (from !== '?' && to !== '?') ? `${from} → ${to}` : 'Route unknown';

  const title = `${alert.icon} ${alert.value} is overhead!`;
  const body  = `${airline} · ${flight.callsign} · ${route} · ${dist}km away`;

  // In-app banner
  document.getElementById('alertBannerTitle').textContent = title;
  document.getElementById('alertBannerBody').textContent  = body;
  const banner = document.getElementById('alertBanner');
  banner.style.display = 'block';
  setTimeout(() => { banner.style.display='none'; }, 8000);

  // Browser notification (if permitted and tab not focused)
  if('Notification' in window && Notification.permission === 'granted' && document.hidden) {
    new Notification('Overhead · ' + title, { body, icon:'/favicon.ico' });
  }
}

function dismissAlert() {
  document.getElementById('alertBanner').style.display = 'none';
}

</script>
