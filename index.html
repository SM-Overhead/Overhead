<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Overhead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0800;
      --surface: #110f00;
      --surface2: #1a1600;
      --border: #2a2200;
      --amber: #f5a623;
      --amber-dim: #7a5310;
      --amber-glow: rgba(245,166,35,0.1);
      --amber-bright: #ffc142;
      --green: #39ff6a;
      --red: #ff4444;
      --text: #f5e6c0;
      --muted: #6b5a30;
      --scanline: rgba(245,166,35,0.025);
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh; min-height: 100dvh;
      overflow-x: hidden;
    }

    body::after {
      content:''; position:fixed; inset:0;
      background: repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px);
      pointer-events:none; z-index:100;
    }

    body::before {
      content:''; position:fixed; top:0; left:50%; transform:translateX(-50%);
      width:100%; height:260px;
      background: radial-gradient(ellipse at top, rgba(245,166,35,0.05) 0%, transparent 70%);
      pointer-events:none; z-index:0;
    }

    .app { position:relative; z-index:1; max-width:430px; margin:0 auto; padding-bottom:60px; }

    /* HEADER */
    .header {
      padding: 36px 20px 14px;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:10px;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px; letter-spacing: 5px; line-height:1;
      color: var(--amber);
      text-shadow: 0 0 20px rgba(245,166,35,0.5), 0 0 60px rgba(245,166,35,0.15);
    }

    .logo-sub {
      font-size:9px; letter-spacing:3px; color:var(--muted);
      margin-top:2px; text-transform:uppercase;
    }

    .status-cluster { display:flex; flex-direction:column; align-items:flex-end; gap:5px; padding-top:4px; }

    .live-badge {
      display:flex; align-items:center; gap:5px;
      font-size:9px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase;
    }
    .live-badge.on { color:var(--green); }
    .live-dot { width:6px; height:6px; border-radius:50%; background:var(--muted); flex-shrink:0; }
    .live-badge.on .live-dot { background:var(--green); box-shadow:0 0 6px var(--green); animation:blink 1.4s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .clock { font-size:10px; color:var(--amber-dim); letter-spacing:1px; }

    .loc-row { font-size:9px; color:var(--muted); letter-spacing:0.5px; }

    /* SCAN BTN */
    .scan-wrap { padding:14px 20px; border-bottom:1px solid var(--border); }

    .scan-btn {
      width:100%; background:transparent;
      border:1px solid var(--amber-dim); color:var(--amber);
      border-radius:3px; padding:13px;
      font-size:11px; font-family:'Share Tech Mono',monospace;
      letter-spacing:3px; text-transform:uppercase;
      cursor:pointer; transition:all 0.2s;
    }
    .scan-btn:hover { background:var(--amber-glow); border-color:var(--amber); }
    .scan-btn:active { opacity:0.8; }
    .scan-btn:disabled { color:var(--muted); border-color:var(--border); cursor:default; }

    .compass-note {
      font-size:9px; color:var(--amber-dim); letter-spacing:0.5px;
      text-align:center; padding:8px 20px;
      border-bottom:1px solid var(--border); display:none;
    }

    .error-row {
      padding:10px 20px; font-size:9px; color:var(--red);
      letter-spacing:0.5px; line-height:1.7;
      border-bottom:1px solid var(--border); display:none;
    }

    /* BOARD */
    .board-header {
      display:grid; grid-template-columns:42px 1fr 68px 52px;
      padding:7px 20px;
      font-size:8px; letter-spacing:1.5px; color:var(--muted);
      text-transform:uppercase; border-bottom:1px solid var(--border);
      background:var(--surface);
    }

    .flight-row {
      display:grid; grid-template-columns:42px 1fr 68px 52px;
      padding:0 20px; border-bottom:1px solid var(--border);
      animation:rowIn 0.3s ease both;
      position:relative; overflow:hidden;
    }

    .flight-row.top-row {
      background:linear-gradient(90deg,rgba(245,166,35,0.05) 0%,transparent 70%);
    }

    @keyframes rowIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    /* Compass cell */
    .cell-compass {
      display:flex; align-items:center; justify-content:center;
      padding:12px 0; border-right:1px solid var(--border);
    }

    .compass-ring {
      width:30px; height:30px;
      border:1px solid var(--amber-dim); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
    }

    .compass-arrow {
      font-size:15px; line-height:1;
      color:var(--amber-bright);
      filter:drop-shadow(0 0 3px rgba(245,166,35,0.7));
      transition:transform 0.5s ease;
      display:block;
    }

    /* Info cell */
    .cell-info {
      padding:10px 10px; border-right:1px solid var(--border); min-width:0;
    }

    .route-line {
      display:flex; align-items:baseline; gap:5px; margin-bottom:3px; flex-wrap:nowrap;
    }

    .iata {
      font-family:'Bebas Neue',sans-serif; font-size:20px;
      letter-spacing:1px; color:var(--amber-bright);
      text-shadow:0 0 8px rgba(245,166,35,0.3); line-height:1; flex-shrink:0;
    }

    .flight-row.top-row .iata { font-size:24px; }

    .route-sep { color:var(--amber-dim); font-size:12px; flex-shrink:0; }

    .airline-row {
      font-size:9px; color:var(--muted); letter-spacing:0.3px;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }

    .callsign-tag { color:var(--amber-dim); margin-left:5px; }
    .ac-type { font-size:8px; color:var(--amber-dim); margin-top:1px; }

    /* Alt cell */
    .cell-alt {
      padding:10px 6px; border-right:1px solid var(--border);
      display:flex; flex-direction:column; align-items:flex-end; justify-content:center;
    }

    .alt-val { font-size:13px; color:var(--text); line-height:1; }
    .cell-unit { font-size:7px; color:var(--muted); margin-top:2px; letter-spacing:1px; }

    /* Dist cell */
    .cell-dist {
      padding:10px 6px;
      display:flex; flex-direction:column; align-items:flex-end; justify-content:center;
    }

    .dist-val { font-size:13px; color:var(--amber); line-height:1; }

    /* Detail panel */
    .detail-panel {
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:12px 20px; display:none;
      grid-column: 1 / -1;
    }

    .detail-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .d-label { font-size:7px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
    .d-val { font-size:13px; color:var(--text); }

    /* States */
    .state-box { padding:56px 20px; text-align:center; color:var(--muted); }
    .state-icon { font-size:36px; margin-bottom:14px; display:block; opacity:0.5; }
    .state-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:3px; color:var(--amber-dim); margin-bottom:8px; }
    .state-sub { font-size:10px; letter-spacing:0.5px; line-height:1.9; }

    .scan-anim { padding:40px 20px; text-align:center; }
    .scan-line {
      width:100%; height:1px; margin:18px 0;
      background:linear-gradient(90deg,transparent,var(--amber),transparent);
      box-shadow:0 0 8px var(--amber);
      animation:scanPulse 1.4s ease-in-out infinite;
    }
    @keyframes scanPulse { 0%,100%{opacity:0.2;transform:scaleX(0.3)} 50%{opacity:1;transform:scaleX(1)} }
    .scan-label { font-size:9px; color:var(--amber-dim); letter-spacing:2px; text-transform:uppercase; animation:fadeLabel 1.4s ease-in-out infinite; }
    @keyframes fadeLabel { 0%,100%{opacity:0.3} 50%{opacity:1} }

    /* Footer */
    .board-footer {
      padding:10px 20px; display:flex; align-items:center; justify-content:space-between;
      font-size:8px; color:var(--muted); letter-spacing:1px; text-transform:uppercase;
    }

    .progress-bar { width:48px; height:1px; background:var(--border); }
    .progress-fill { height:100%; background:var(--amber-dim); transition:width 1s linear; }
    .refresh-track { display:flex; align-items:center; gap:7px; }
  </style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-top">
      <div>
        <div class="logo">OVERHEAD</div>
        <div class="logo-sub">Live Air Traffic</div>
      </div>
      <div class="status-cluster">
        <div class="live-badge" id="liveBadge">
          <div class="live-dot"></div>
          <span id="liveLabel">OFFLINE</span>
        </div>
        <div class="clock" id="clock">--:--:--</div>
      </div>
    </div>
    <div class="loc-row" id="locRow">▸ AWAITING LOCATION</div>
  </div>

  <div class="scan-wrap">
    <button class="scan-btn" id="scanBtn" onclick="startTracking()">◈ &nbsp; SCAN AIRSPACE</button>
  </div>

  <div class="compass-note" id="compassNote">↻ ALLOW COMPASS ACCESS WHEN PROMPTED — USED TO POINT AT AIRCRAFT</div>
  <div class="error-row" id="errorRow"></div>
  <div id="boardWrap"></div>
  <div class="board-footer" id="boardFooter" style="display:none">
    <span id="footerCount">— AIRCRAFT</span>
    <div class="refresh-track">
      <span id="footerCountdown">REFRESH 15s</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:100%"></div></div>
    </div>
  </div>

</div>
<script>
const AIRLINES = {
  EZY:'easyJet',BAW:'British Airways',RYR:'Ryanair',TOM:'TUI Airways',
  TCX:'TUI Airways',VIR:'Virgin Atlantic',EXS:'Jet2',DLH:'Lufthansa',
  AFR:'Air France',KLM:'KLM',IBE:'Iberia',AZA:'ITA Airways',
  UAE:'Emirates',QTR:'Qatar Airways',ETD:'Etihad',SIA:'Singapore Airlines',
  AAL:'American Airlines',UAL:'United Airlines',DAL:'Delta Air Lines',
  SWA:'Southwest',ACA:'Air Canada',WJA:'WestJet',QFA:'Qantas',
  ANZ:'Air New Zealand',CPA:'Cathay Pacific',ANA:'ANA',JAL:'Japan Airlines',
  CSN:'China Southern',CCA:'Air China',THY:'Turkish Airlines',
  AEE:'Aegean Airlines',BEL:'Brussels Airlines',SAS:'Scandinavian Airlines',
  FIN:'Finnair',TAP:'TAP Air Portugal',LOT:'LOT Polish',WZZ:'Wizz Air',
  VLG:'Vueling',IBX:'Iberia Express',EIN:'Aer Lingus',LOG:'Loganair',
  TRA:'Transavia',SXS:'SunExpress',FDB:'flydubai',GFA:'Gulf Air',
  SVA:'Saudia',MSR:'EgyptAir',RAM:'Royal Air Maroc',ETH:'Ethiopian',
};

const CITIES = {
  LHR:'London',LGW:'London',STN:'London',LTN:'London',LCY:'London',
  MAN:'Manchester',BHX:'Birmingham',EDI:'Edinburgh',GLA:'Glasgow',
  BRS:'Bristol',NCL:'Newcastle',LBA:'Leeds',EMA:'East Midlands',
  ABZ:'Aberdeen',INV:'Inverness',BFS:'Belfast',DUB:'Dublin',
  CDG:'Paris',ORY:'Paris',AMS:'Amsterdam',FRA:'Frankfurt',
  MUC:'Munich',BCN:'Barcelona',MAD:'Madrid',FCO:'Rome',
  MXP:'Milan',ZRH:'Zurich',VIE:'Vienna',CPH:'Copenhagen',
  ARN:'Stockholm',OSL:'Oslo',HEL:'Helsinki',LIS:'Lisbon',
  ATH:'Athens',IST:'Istanbul',DXB:'Dubai',AUH:'Abu Dhabi',
  DOH:'Doha',JFK:'New York',LAX:'Los Angeles',ORD:'Chicago',
  ATL:'Atlanta',DFW:'Dallas',MIA:'Miami',BOS:'Boston',
  SFO:'San Francisco',YYZ:'Toronto',SYD:'Sydney',SIN:'Singapore',
  HKG:'Hong Kong',NRT:'Tokyo',HND:'Tokyo',ICN:'Seoul',
  PEK:'Beijing',PVG:'Shanghai',BKK:'Bangkok',DEL:'Delhi',BOM:'Mumbai',
};

let userLat=null, userLon=null, compassHeading=null;
let countdown=15, countdownTimer=null;
const REFRESH=15, MIN_SPD=50;

// Clock
setInterval(()=>{
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
},1000);

// Compass
function initCompass() {
  if (typeof DeviceOrientationEvent === 'undefined') return;
  const listen = () => {
    window.addEventListener('deviceorientationabsolute', onOrient, true);
    window.addEventListener('deviceorientation', onOrient, true);
  };
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById('compassNote').style.display = 'block';
    DeviceOrientationEvent.requestPermission()
      .then(s => { document.getElementById('compassNote').style.display='none'; if(s==='granted') listen(); })
      .catch(() => { document.getElementById('compassNote').style.display='none'; });
  } else { listen(); }
}

function onOrient(e) {
  if (e.webkitCompassHeading != null) compassHeading = e.webkitCompassHeading;
  else if (e.alpha != null) compassHeading = (360 - e.alpha + 360) % 360;
  updateArrows();
}

function bearingTo(lat2, lon2) {
  if (userLat==null) return null;
  const dL=(lon2-userLon)*Math.PI/180, la1=userLat*Math.PI/180, la2=lat2*Math.PI/180;
  const y=Math.sin(dL)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dL);
  return ((Math.atan2(y,x)*180/Math.PI)+360)%360;
}

function relAngle(b) {
  if (compassHeading==null) return null;
  return ((b - compassHeading)+360)%360;
}

function updateArrows() {
  document.querySelectorAll('.compass-arrow[data-bearing]').forEach(el=>{
    const rel = relAngle(parseFloat(el.dataset.bearing));
    if (rel!=null) el.style.transform = `rotate(${rel}deg)`;
  });
}

function staticArrow(b) {
  return ['↑','↗','→','↘','↓','↙','←','↖'][Math.round(b/45)%8];
}

// Helpers
function setLive(on,label) {
  const b=document.getElementById('liveBadge');
  b.className='live-badge'+(on?' on':'');
  document.getElementById('liveLabel').textContent=label||(on?'LIVE':'OFFLINE');
}
function showError(msg) {
  const el=document.getElementById('errorRow');
  el.textContent=msg?'⚠ '+msg:''; el.style.display=msg?'block':'none';
}
function distKm(la1,lo1,la2,lo2) {
  const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function guessAirline(cs) {
  if(!cs) return null;
  return AIRLINES[cs.replace(/[0-9\s]/g,'').toUpperCase()]||null;
}
function cityFor(iata) { return iata?(CITIES[iata]||null):null; }

// API
async function lookupRoute(cs) {
  if(!cs) return null;
  try {
    const r=await fetch(`https://api.adsbdb.com/v0/callsign/${cs.trim()}`);
    if(!r.ok) return null;
    const d=await r.json();
    const rt=d?.response?.flightroute;
    if(!rt) return null;
    return {
      from:rt.origin?.iata_code||rt.origin?.icao_code||null,
      to:rt.destination?.iata_code||rt.destination?.icao_code||null,
      fromCity:rt.origin?.municipality||null,
      toCity:rt.destination?.municipality||null,
      airline:rt.airline?.name||null,
    };
  } catch{return null;}
}

async function lookupAircraft(hex) {
  if(!hex) return null;
  try {
    const r=await fetch(`https://api.adsbdb.com/v0/aircraft/${hex}`);
    if(!r.ok) return null;
    const d=await r.json();
    const a=d?.response?.aircraft;
    if(!a) return null;
    return {type:a.type||null,icaoType:a.icao_type||null,reg:a.registration||null};
  } catch{return null;}
}

// Tracking
function startTracking() {
  const btn=document.getElementById('scanBtn');
  btn.disabled=true; btn.textContent='◌  LOCATING…';
  setLive(false,'LOCATING'); showError('');
  navigator.geolocation.getCurrentPosition(
    pos=>{
      userLat=pos.coords.latitude; userLon=pos.coords.longitude;
      document.getElementById('locRow').textContent=
        `▸ ${userLat.toFixed(4)}°N  ${Math.abs(userLon).toFixed(4)}°${userLon<0?'W':'E'}`;
      btn.textContent='↺  REFRESH NOW'; btn.disabled=false; btn.onclick=fetchFlights;
      initCompass(); fetchFlights();
    },
    ()=>{
      showError('Location denied — allow in browser settings');
      btn.disabled=false; btn.textContent='◈  SCAN AIRSPACE'; setLive(false,'OFFLINE');
    },
    {enableHighAccuracy:true}
  );
}

function startCountdown() {
  clearInterval(countdownTimer); countdown=REFRESH;
  const fill=document.getElementById('progressFill');
  const label=document.getElementById('footerCountdown');
  document.getElementById('boardFooter').style.display='flex';
  countdownTimer=setInterval(()=>{
    countdown--;
    fill.style.width=(countdown/REFRESH*100)+'%';
    label.textContent=`REFRESH ${countdown}s`;
    if(countdown<=0){clearInterval(countdownTimer);fetchFlights();}
  },1000);
}

async function fetchFlights() {
  if(!userLat) return;
  showError(''); setLive(false,'SCANNING');
  document.getElementById('boardFooter').style.display='none';
  document.getElementById('boardWrap').innerHTML=`
    <div class="scan-anim">
      <div class="scan-label">SCANNING AIRSPACE</div>
      <div class="scan-line"></div>
      <div class="scan-label">ACQUIRING SIGNALS</div>
    </div>`;

  try {
    const res=await fetch(`https://api.airplanes.live/v2/point/${userLat}/${userLon}/50`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data=await res.json();

    const airborne=(data.ac||[])
      .filter(a=>{
        if(a.on_ground) return false;
        if(a.gs!=null && a.gs<MIN_SPD) return false;
        if(a.alt_baro!=null && a.alt_baro<300) return false;
        return a.lat && a.lon;
      })
      .map(a=>({...a, dist:distKm(userLat,userLon,a.lat,a.lon)}))
      .sort((a,b)=>a.dist-b.dist)
      .slice(0,6);

    if(!airborne.length) {
      document.getElementById('boardWrap').innerHTML=`
        <div class="state-box">
          <span class="state-icon">🌤</span>
          <div class="state-title">CLEAR SKIES</div>
          <div class="state-sub">NO AIRBORNE TRAFFIC WITHIN 50KM<br>CHECKING AGAIN IN ${REFRESH}S</div>
        </div>`;
      setLive(true,'LIVE'); startCountdown(); return;
    }

    const enriched=await Promise.all(airborne.map(async a=>{
      const callsign=(a.flight||'').trim();
      const [route,acInfo]=await Promise.all([lookupRoute(callsign),lookupAircraft(a.hex)]);
      return {...a,callsign,route,acInfo};
    }));

    setLive(true,'LIVE'); renderBoard(enriched);
    document.getElementById('footerCount').textContent=`${enriched.length} AIRCRAFT`;
    startCountdown();
  } catch(e) {
    showError(`Fetch failed: ${e.message}`);
    document.getElementById('boardWrap').innerHTML='';
    setLive(false,'ERROR'); startCountdown();
  }
}

function renderBoard(flights) {
  let html=`
    <div class="board-header">
      <div>DIR</div><div>ROUTE</div>
      <div style="text-align:right">ALT</div>
      <div style="text-align:right">DIST</div>
    </div>`;

  flights.forEach((f,i)=>{
    const isTop=i===0;
    const cs=f.callsign||f.hex||'??????';
    const airline=f.route?.airline||guessAirline(cs)||'—';
    const from=f.route?.from||null, to=f.route?.to||null;
    const fromCity=f.route?.fromCity||cityFor(from)||from||'???';
    const toCity=f.route?.toCity||cityFor(to)||to||'???';
    const alt=f.alt_baro?Math.round(f.alt_baro).toLocaleString():'—';
    const dist=f.dist.toFixed(1);
    const spd=f.gs?Math.round(f.gs):'—';
    const hdg=f.track!=null?Math.round(f.track)+'°':'—';
    const acType=f.acInfo?.type||f.acInfo?.icaoType||f.t||null;
    const reg=f.acInfo?.reg||f.r||null;
    const bearing=bearingTo(f.lat,f.lon);
    const bAttr=bearing!=null?`data-bearing="${bearing.toFixed(1)}"`:' ';
    const initRel=(compassHeading!=null&&bearing!=null)?relAngle(bearing):null;
    const initStyle=initRel!=null?`style="transform:rotate(${initRel}deg)"`:' ';
    const arrow=bearing!=null?staticArrow(bearing):'✈';

    const routeDisplay=(from&&to)?`
      <div class="route-line">
        <span class="iata">${from}</span>
        <span class="route-sep">→</span>
        <span class="iata">${to}</span>
      </div>
      <div class="airline-row">${airline}<span class="callsign-tag">${cs}</span></div>
      ${(acType||reg)?`<div class="ac-type">${[acType,reg].filter(Boolean).join(' · ')}</div>`:''}`
    :`
      <div class="route-line">
        <span class="iata" style="font-size:16px;color:var(--amber-dim)">${cs}</span>
      </div>
      <div class="airline-row">${airline}<span class="callsign-tag" style="color:var(--muted)">NO ROUTE</span></div>
      ${(acType||reg)?`<div class="ac-type">${[acType,reg].filter(Boolean).join(' · ')}</div>`:''}`;

    html+=`
      <div class="flight-row ${isTop?'top-row':''}" style="animation-delay:${i*0.06}s" onclick="toggleDetail('det-${i}')">
        <div class="cell-compass">
          <div class="compass-ring">
            <span class="compass-arrow" ${bAttr} ${initStyle}>${arrow}</span>
          </div>
        </div>
        <div class="cell-info">${routeDisplay}</div>
        <div class="cell-alt">
          <div class="alt-val">${alt}</div>
          <div class="cell-unit">FT</div>
        </div>
        <div class="cell-dist">
          <div class="dist-val">${dist}</div>
          <div class="cell-unit">KM</div>
        </div>
      </div>
      <div class="detail-panel" id="det-${i}">
        <div class="detail-grid">
          <div><div class="d-label">Speed</div><div class="d-val">${spd} <span style="font-size:9px;color:var(--muted)">KTS</span></div></div>
          <div><div class="d-label">Heading</div><div class="d-val">${hdg}</div></div>
          <div><div class="d-label">Bearing</div><div class="d-val">${bearing!=null?Math.round(bearing)+'°':'—'}</div></div>
          ${fromCity&&fromCity!==from?`<div><div class="d-label">From</div><div class="d-val" style="font-size:11px">${fromCity}</div></div>`:''}
          ${toCity&&toCity!==to?`<div><div class="d-label">To</div><div class="d-val" style="font-size:11px">${toCity}</div></div>`:''}
        </div>
      </div>`;
  });

  document.getElementById('boardWrap').innerHTML=html;
}

function toggleDetail(id) {
  const el=document.getElementById(id);
  if(!el) return;
  const open=el.style.display==='block';
  document.querySelectorAll('.detail-panel').forEach(p=>p.style.display='none');
  if(!open) el.style.display='block';
}
</script>
</body>
</html>
