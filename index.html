<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Overhead</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --surface: #0d1220;
      --surface2: #111827;
      --border: #1a2340;
      --accent: #3b82f6;
      --accent2: #06b6d4;
      --green: #10b981;
      --text: #f0f4ff;
      --muted: #4b5f7c;
      --subtle: #1e2d47;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh; min-height: 100dvh;
      overflow-x: hidden;
    }

    body::before {
      content:''; position:fixed; top:-30%; left:-20%;
      width:70%; height:70%;
      background:radial-gradient(ellipse,rgba(59,130,246,0.07) 0%,transparent 70%);
      pointer-events:none; z-index:0;
    }

    .app {
      position:relative; z-index:1;
      max-width:430px; margin:0 auto;
      padding:0 16px 40px;
    }

    .header {
      padding:52px 0 8px;
      display:flex; align-items:flex-end; justify-content:space-between;
    }

    .logo { display:flex; align-items:center; gap:10px; }

    .logo-icon {
      width:36px; height:36px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius:10px;
      display:flex; align-items:center; justify-content:center;
      font-size:18px;
    }

    .logo h1 {
      font-family:'Syne',sans-serif;
      font-size:26px; font-weight:800; letter-spacing:-0.5px;
      background:linear-gradient(90deg,#f0f4ff,#94b4ff);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }

    .live-pill {
      display:flex; align-items:center; gap:6px;
      background:var(--surface); border:1px solid var(--border);
      border-radius:20px; padding:6px 12px;
